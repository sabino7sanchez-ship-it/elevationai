        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a2e;
            --cyan: #00e5ff;
            --purple: #a855f7;
            --pink: #ec4899;
            --text: #e0e0e0;
            --text-dim: #888;
            --border: #1e1e2e;
            --gradient: linear-gradient(135deg, #00e5ff, #a855f7);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 50px 20px 30px;
            position: relative;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 300px;
            background: radial-gradient(ellipse at 50% 0%, rgba(0,229,255,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .header h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .header .subtitle {
            font-size: 1.1rem;
            color: var(--text-dim);
            font-weight: 300;
        }
        .header .brand {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 18px;
            border: 1px solid rgba(0,229,255,0.3);
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--cyan);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* STATS BAR */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            margin: 0 auto 30px;
            max-width: 800px;
            flex-wrap: wrap;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* CONTENT TYPE TAGS */
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tag-portfolio { background: rgba(0,229,255,0.15); color: #00e5ff; }
        .tag-value { background: rgba(168,85,247,0.15); color: #a855f7; }
        .tag-bts { background: rgba(236,72,153,0.15); color: #ec4899; }
        .tag-casestudy { background: rgba(34,197,94,0.15); color: #22c55e; }
        .tag-founder { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .tag-reel { background: rgba(239,68,68,0.15); color: #ef4444; }
        .tag-cta { background: rgba(99,102,241,0.15); color: #6366f1; }

        /* LEGEND */
        .legend {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            padding: 0 20px 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* CALENDAR GRID */
        .calendar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }
        .weekday-headers {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }
        .weekday-header {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 0;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .day-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            min-height: 110px;
        }
        .day-card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(0,229,255,0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,229,255,0.08);
        }
        .day-card.empty {
            background: transparent;
            border: 1px dashed #1a1a2a;
            cursor: default;
            min-height: 0;
        }
        .day-card.empty:hover {
            transform: none;
            box-shadow: none;
            border-color: #1a1a2a;
        }
        .day-number {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 6px;
        }
        .day-date {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .day-title {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text);
            line-height: 1.3;
            margin-top: 6px;
        }
        .day-time {
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-top: 6px;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            max-width: 640px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 36px;
            position: relative;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-close {
            position: absolute;
            top: 16px; right: 16px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .modal-day-number {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--cyan);
            margin-bottom: 4px;
        }
        .modal-date {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
        }
        .modal-section {
            margin-bottom: 20px;
        }
        .modal-section-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .modal-caption {
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text);
            white-space: pre-line;
            background: rgba(0,0,0,0.3);
            padding: 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .modal-hashtags {
            font-size: 0.85rem;
            color: var(--cyan);
            line-height: 1.8;
        }
        .modal-visual {
            font-size: 0.85rem;
            color: var(--text);
            line-height: 1.6;
            background: rgba(168,85,247,0.08);
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(168,85,247,0.15);
        }
        .modal-time {
            font-size: 0.9rem;
            color: var(--purple);
            font-weight: 500;
        }
        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: var(--gradient);
            color: #000;
            border: none;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .copy-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(0,229,255,0.3);
        }
        .copy-btn.copied {
            background: #22c55e;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .weekday-headers { display: none; }
            .calendar-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .day-card.empty { display: none; }
            .day-card {
                min-height: 0;
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 10px;
                padding: 16px;
            }
            .day-number { margin-bottom: 0; font-size: 1.1rem; }
            .day-date { margin-bottom: 0; }
            .day-title { flex: 1; margin-top: 0; min-width: 120px; }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
        }
        .footer a {
            color: var(--cyan);
            text-decoration: none;
        }
    </style>
</head>

// Build calendar
function buildCalendar() {
    const grid = document.getElementById('calendarGrid');
    // Mar 30, 2026 is a Monday, so no empty cells needed at the start
    // Week 1: Mon-Sun = days 1-7
    // Week 2: Mon-Sun = days 8-14
    // Week 3: Mon-Sun = days 15-21
    // Week 4: Mon-Sun = days 22-28
    // Week 5: Mon-Tue = days 29-30, then 5 empty

    calendarData.forEach(d => {
        const card = document.createElement('div');
        card.className = 'day-card';
        card.onclick = () => openModal(d);

        const borderColors = {
            portfolio: 'rgba(0,229,255,0.4)',
            value: 'rgba(168,85,247,0.4)',
            bts: 'rgba(236,72,153,0.4)',
            casestudy: 'rgba(34,197,94,0.4)',
            founder: 'rgba(251,191,36,0.4)',
            reel: 'rgba(239,68,68,0.4)',
            cta: 'rgba(99,102,241,0.4)'
        };
        card.style.borderLeftColor = borderColors[d.type] || 'var(--border)';
        card.style.borderLeftWidth = '3px';

        card.innerHTML = `
            <div class="day-number">${d.day}</div>
            <div class="day-date">${d.date}</div>
            <span class="tag ${d.tagClass}">${d.tag}</span>
            <div class="day-title">${d.title}</div>
            <div class="day-time">${d.time}</div>
        `;
        grid.appendChild(card);
    });

    // Add empty cells to fill last week
    for (let i = 0; i < 5; i++) {
        const empty = document.createElement('div');
        empty.className = 'day-card empty';
        grid.appendChild(empty);
    }
}

function openModal(d) {
    const overlay = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');

    content.innerHTML = `
        <div class="modal-day-number">Day ${d.day} of 30</div>
        <div class="modal-date">${d.date} &middot; ${d.format}</div>
        <span class="tag ${d.tagClass}" style="margin-bottom:16px;display:inline-block;">${d.tag}</span>
        <div class="modal-title">${d.title}</div>

        <div class="modal-section">
            <div class="modal-section-label">Best Posting Time</div>
            <div class="modal-time">${d.time}</div>
        </div>

        <div class="modal-section">
            <div class="modal-section-label">Caption (ready to copy)</div>
            <div class="modal-caption" id="captionText">${d.caption}</div>
            <button class="copy-btn" onclick="copyCaption(this)" style="margin-top:12px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                Copy Caption
            </button>
        </div>

        <div class="modal-section">
            <div class="modal-section-label">Hashtags</div>
            <div class="modal-hashtags" id="hashtagText">${d.hashtags}</div>
            <button class="copy-btn" onclick="copyHashtags(this)" style="margin-top:12px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                Copy Hashtags
            </button>
        </div>

        <div class="modal-section">
            <div class="modal-section-label">Visual Direction</div>
            <div class="modal-visual">${d.visual}</div>
        </div>
    `;

    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});

function copyCaption(btn) {
    const caption = document.getElementById('captionText').innerText;
    const hashtags = document.getElementById('hashtagText').innerText;
    navigator.clipboard.writeText(caption + '\n\n' + hashtags).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Copied!`;
        setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy Caption`;
        }, 2000);
    });
}

function copyHashtags(btn) {
    const hashtags = document.getElementById('hashtagText').innerText;
    navigator.clipboard.writeText(hashtags).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Copied!`;
        setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy Hashtags`;
        }, 2000);
    });
}

buildCalendar();
</script>
